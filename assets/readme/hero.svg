<svg width="1600" height="760" viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KnowMesh compiles source folders into trustworthy knowledge assets">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbf9"/>
      <stop offset="0.55" stop-color="#eef7f5"/>
      <stop offset="1" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="hero-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f7fb"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="760" rx="38" fill="url(#hero-bg)"/>
  <path d="M1160 88C1288 72 1416 126 1470 238C1540 384 1450 572 1298 618C1144 666 1016 580 968 448C916 306 1006 108 1160 88Z" fill="#dbeafe" opacity="0.58"/>
  <path d="M112 610C236 536 382 548 498 626C566 672 640 700 738 672C828 646 906 588 1008 602C1102 614 1168 674 1258 690H112Z" fill="#d1fae5" opacity="0.48"/>

  <g transform="translate(92 88)">
    <rect x="0" y="0" width="1416" height="584" rx="34" fill="url(#hero-panel)" stroke="#d6e3ea" filter="url(#soft-shadow)"/>

