<svg width="1600" height="700" viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KnowMesh K12 Expert scenario">
  <defs>
    <linearGradient id="k12-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcfbff"/>
      <stop offset="0.55" stop-color="#f3fbf8"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="k12-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
    <marker id="k12-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="1600" height="700" rx="32" fill="url(#k12-bg)"/>
  <text x="90" y="88" font-family="Segoe UI, Microsoft YaHei UI, Arial, sans-serif" font-size="44" font-weight="760" fill="#102326">K12 Expert: Textbooks Are Structured Domains</text>
  <text x="90" y="132" font-family="Segoe UI, Microsoft YaHei UI, Arial, sans-serif" font-size="23" font-weight="520" fill="#526879">The first Expert scenario proves that KnowMesh can preserve domain structure, not only vector chunks.</text>

  <g transform="translate(80 214)" font-family="Segoe UI, Microsoft YaHei UI, Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="260" height="310" rx="28" fill="#ffffff" stroke="#cbd5e1" filter="url(#k12-shadow)"/>
      <path d="M52 62H194V238H52Z" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
      <path d="M76 102H170M76 136H170M76 170H140" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
      <text x="130" y="282" text-anchor="middle" font-size="23" font-weight="740" fill="#102326">Textbook</text>
    </g>

    <path d="M286 155H354" stroke="#0f766e" stroke-width="5" marker-end="url(#k12-arrow)"/>

    <g transform="translate(380 0)">
      <rect x="0" y="0" width="300" height="310" rx="28" fill="#ffffff" stroke="#9fd7ce" filter="url(#k12-shadow)"/>
      <text x="34" y="58" font-size="26" font-weight="760" fill="#0f766e">Structure</text>
      <text x="34" y="110" font-size="21" fill="#405766">TOC</text>
      <text x="34" y="150" font-size="21" fill="#405766">Unit</text>
      <text x="34" y="190" font-size="21" fill="#405766">Lesson</text>
      <text x="34" y="230" font-size="21" fill="#405766">Page anchor</text>
      <path d="M150 98V238" stroke="#0f766e" stroke-width="4"/>
      <circle cx="150" cy="106" r="9" fill="#0f766e"/>
      <circle cx="150" cy="146" r="9" fill="#2563eb"/>
      <circle cx="150" cy="186" r="9" fill="#db2777"/>
      <circle cx="150" cy="226" r="9" fill="#f59e0b"/>
    </g>

    <path d="M706 155H774" stroke="#0f766e" stroke-width="5" marker-end="url(#k12-arrow)"/>

    <g transform="translate(800 0)">
      <rect x="0" y="0" width="330" height="310" rx="28" fill="#ffffff" stroke="#bfdbfe" filter="url(#k12-shadow)"/>
      <text x="34" y="58" font-size="26" font-weight="760" fill="#1d4ed8">Domain Objects</text>
      <g font-size="20" fill="#405766">
        <text x="34" y="112">Vocabulary</text>
        <text x="34" y="154">Formula</text>
        <text x="34" y="196">Exercise</text>
        <text x="34" y="238">Experiment</text>
      </g>
      <g transform="translate(206 88)">
        <rect x="0" y="0" width="82" height="42" rx="14" fill="#ecfdf5" stroke="#6ee7b7"/>
        <rect x="0" y="58" width="82" height="42" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
        <rect x="0" y="116" width="82" height="42" rx="14" fill="#fff7ed" stroke="#fdba74"/>
      </g>
    </g>

    <path d="M1156 155H1224" stroke="#0f766e" stroke-width="5" marker-end="url(#k12-arrow)"/>

    <g transform="translate(1250 0)">
      <rect x="0" y="0" width="260" height="310" rx="28" fill="#102326" stroke="#23454e" filter="url(#k12-shadow)"/>
      <text x="34" y="58" font-size="26" font-weight="760" fill="#d9f3ef">Cited Answer</text>
      <text x="34" y="112" font-size="20" fill="#b7d9d2">scope checked</text>
      <text x="34" y="154" font-size="20" fill="#b7d9d2">evidence found</text>
      <text x="34" y="196" font-size="20" fill="#b7d9d2">page cited</text>
      <text x="34" y="238" font-size="20" fill="#b7d9d2">feedback ready</text>
    </g>
  </g>

  <g transform="translate(226 586)" font-family="Segoe UI, Microsoft YaHei UI, Arial, sans-serif">
    <rect x="0" y="0" width="1148" height="54" rx="18" fill="#ffffff" stroke="#d6e3ea"/>
    <text x="28" y="35" font-size="21" font-weight="650" fill="#102326">No bundled textbooks.</text>
    <text x="286" y="35" font-size="21" fill="#526879">Templates provide processing strategy; users provide authorized source materials.</text>
  </g>
</svg>
