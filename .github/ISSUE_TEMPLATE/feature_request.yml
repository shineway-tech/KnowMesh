name: Feature request
description: Propose a KnowMesh capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or maintenance pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior and user-facing outcome.
    validations:
      required: true
  - type: textarea
    id: data-model
    attributes:
      label: Data and safety impact
      description: Note any effect on workspace.sqlite, catalog.sqlite, credentials, local files, cloud operations, or generated artifacts.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web Console
        - KnowMesh Core
        - KnowMesh Expert
        - Provider Layer
        - Platform / Launcher
        - Documentation
    validations:
      required: true
