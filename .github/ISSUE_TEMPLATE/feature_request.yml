name: Feature request
description: Suggest a product, workflow, provider, or Expert improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What knowledge-asset reliability, traceability, maintainability, or integration problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the desired behavior or workflow.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Web Console
        - Knowledge Asset Layer
        - Query Runtime
        - Expert
        - Provider
        - Platform
        - Documentation
  - type: textarea
    id: safety
    attributes:
      label: Data, cost, or security boundary
      description: Note whether this touches documents, credentials, cloud calls, generated artifacts, or release packages.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
