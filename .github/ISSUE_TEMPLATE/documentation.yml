name: Documentation
description: Report unclear, missing, outdated, or mistranslated documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link the README, doc page, section, or command output that needs attention.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is confusing, missing, outdated, or hard to translate?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional wording, screenshots, or examples that would make the page clearer.
    validations:
      required: false
