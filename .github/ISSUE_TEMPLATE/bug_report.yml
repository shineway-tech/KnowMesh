name: Bug report
description: Report a reproducible KnowMesh problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact local actions or API calls that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, KnowMesh version, and whether this is local demo or Aliyun mode.
      placeholder: |
        OS:
        Node.js:
        KnowMesh:
        Mode:
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Sensitive data check
      description: Confirm you removed secrets, source document text, generated artifacts, and local paths from logs/screenshots.
    validations:
      required: true
