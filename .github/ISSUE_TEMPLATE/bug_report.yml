name: Bug report
description: Report reproducible KnowMesh behavior without sharing private data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve KnowMesh. Please remove secrets, private document text, generated artifacts, and local paths before posting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the user-visible behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use public samples when possible.
      placeholder: |
        1. Start KnowMesh...
        2. Open...
        3. Run...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KnowMesh version / commit
      placeholder: "0.1.0-alpha or commit SHA"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web Console
        - Query Runtime
        - Build pipeline
        - K12 Expert
        - Provider adapter
        - Platform / launcher
        - Documentation
        - Release / package
  - type: textarea
    id: evidence
    attributes:
      label: Safe evidence
      description: Paste redacted logs, commands, screenshots, or test output. Do not include secrets or private text.
