name: Browser Sample Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/browser-sample-smoke.mjs"
      - "src/local-service/**"
      - "src/web-console/**"
      - "examples/public-samples/**"
      - "package.json"

jobs:
  browser-sample-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install
      - run: npm run smoke:browser-sample
